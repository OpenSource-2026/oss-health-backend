# docker-compose configuration for local development.
#
# Usage:
#   1. Copy .env.example to .env and fill in your secrets:
#        cp .env.example .env
#   2. Start the backend:
#        docker compose up --build
#   3. Verify:
#        curl http://localhost:8000/api/v1/health
#
# In CI / Phase G integration, additional services (frontend, data
# pipeline) will be added alongside `backend` in this file.

services:
  backend:
    build: .
    image: oss-health-backend:dev
    container_name: oss-health-backend
    # `.env` is gitignored. The `required: false` flag lets the stack
    # boot even without a local .env (placeholder values then come from
    # the shell or default to empty), so a fresh clone can run for a
    # quick smoke test before secrets are configured.
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Healthcheck is inherited from the HEALTHCHECK directive in the
    # Dockerfile (probes GET /api/v1/health every 30s).

  # --- Observability: Prometheus scrapes the backend's /metrics; Grafana
  # visualises it. Open Grafana at http://localhost:3001 (anonymous viewer) →
  # "OSS Health Checker — Backend" dashboard. ---
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: oss-health-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: oss-health-grafana
    environment:
      # Anonymous viewer access so the dashboard opens with no login (demo).
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
