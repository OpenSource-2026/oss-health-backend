# Auto-load dashboard JSON files from the mounted dashboards directory.
apiVersion: 1

providers:
  - name: OSS Health
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
