# OSS Health Checker — Backend CI
#
# Runs on every push to main and every pull request targeting main.
# Lint + tests run on Python 3.12; a separate job verifies that the
# production Docker image still builds. Both jobs must pass before a
# PR can be merged.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & test
    runs-on: ubuntu-latest
    env:
      # Settings validation requires both keys at import time; use dummy
      # values so the test suite can boot without a real .env in CI.
      GITHUB_TOKEN: ci-dummy-token
      GEMINI_API_KEY: ci-dummy-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Test (pytest)
        run: pytest -q

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: oss-health-backend:ci
